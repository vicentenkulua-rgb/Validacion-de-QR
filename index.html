<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0F1E">
<title>Viteoca QR — Validador Profesional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c-bg:#0A0F1E;--c-surface:#111827;--c-surface2:#1C2638;--c-border:#FFFFFF15;
  --c-blue:#3B82F6;--c-green:#22C55E;--c-orange:#F97316;--c-red:#EF4444;
  --c-text:#F0F4FF;--c-muted:#7A8BA6;--c-accent:#38BDF8;
  --r:16px;--r-sm:8px;--trans:0.2s ease;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--c-bg);color:var(--c-text);font-family:'DM Sans',sans-serif}
#app{height:100%;display:flex;flex-direction:column}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--c-bg);border-bottom:1px solid var(--c-border);z-index:10}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--c-accent)}
.nav-tabs{display:flex;gap:6px;background:var(--c-surface);border-radius:var(--r-sm);padding:4px}
.nav-tab{border:none;background:none;color:var(--c-muted);font-size:13px;padding:8px 14px;border-radius:6px;cursor:pointer;transition:var(--trans);font-weight:500}
.nav-tab.active{background:var(--c-surface2);color:var(--c-text)}

/* PAGES */
.page{flex:1;overflow-y:auto;display:none;flex-direction:column;padding:16px}
.page.active{display:flex}

/* SCANNER */
#reader{width:100%;max-width:500px;margin:0 auto;border:none !important;background:var(--c-surface);border-radius:var(--r);overflow:hidden}
#reader video{border-radius:var(--r);object-fit:cover}
.scan-status{text-align:center;margin-top:16px;font-size:14px;color:var(--c-muted)}

/* DATA & STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:16px;text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.5px}

.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px}

.btn{width:100%;padding:14px;border:none;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:var(--trans);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--c-blue);color:#fff}
.btn-danger{background:rgba(239,68,68,0.1);color:var(--c-red);border:1px solid var(--c-red);margin-top:12px}
.btn:active{transform:scale(0.98)}

#import-result{margin-top:16px;padding:12px;border-radius:var(--r-sm);background:rgba(34,197,94,0.1);border:1px solid var(--c-green);color:var(--c-green);text-align:center;font-weight:700;display:none}

/* RESULT MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{width:100%;max-width:380px;border-radius:var(--r);padding:30px;text-align:center;animation:pop 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes pop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{font-size:54px;margin-bottom:16px}
.modal-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:20px}
.modal-info{text-align:left;background:rgba(255,255,255,0.05);border-radius:var(--r-sm);padding:16px;margin-bottom:20px}
.info-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px}
.info-row:last-child{margin-bottom:0}
.info-label{color:var(--c-muted)}
.info-val{font-weight:700}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--c-surface2);padding:12px 24px;border-radius:50px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:var(--trans);pointer-events:none;border:1px solid var(--c-border)}
.toast.show{opacity:1;bottom:40px}

table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
th{text-align:left;color:var(--c-muted);padding:8px;border-bottom:1px solid var(--c-border)}
td{padding:8px;border-bottom:1px solid var(--c-border)}
</style>
</head>
<body>

<div id="app">
  <nav class="nav">
    <div class="nav-logo">Viteoca<span>QR</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="scanner">Escáner</button>
      <button class="nav-tab" data-page="data">Datos</button>
      <button class="nav-tab" data-page="history">Historial</button>
    </div>
  </nav>

  <!-- SCANNER -->
  <div class="page active" id="page-scanner">
    <div id="reader"></div>
    <div class="scan-status" id="scan-status">Listo para escanear</div>
  </div>

  <!-- DATA -->
  <div class="page" id="page-data">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-total" style="color:var(--c-accent)">0</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-valid" style="color:var(--c-green)">0</div><div class="stat-label">Válidos</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-used" style="color:var(--c-orange)">0</div><div class="stat-label">Usados</div></div>
    </div>
    <div class="card">
      <div class="section-title">Importar Base de Datos</div>
      <button class="btn btn-primary" id="btn-upload">📂 Seleccionar CSV</button>
      <input type="file" id="csv-input" accept=".csv" style="display:none">
      <div id="import-result"></div>
      <button class="btn btn-danger" id="btn-clear" style="display:none">🗑 Borrar Datos</button>
    </div>
    <div class="card" id="preview-card" style="display:none">
      <div class="section-title">Últimos Importados</div>
      <div id="preview-table"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div id="history-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modal-content">
    <div class="modal-icon" id="modal-icon">✓</div>
    <div class="modal-title" id="modal-title">VÁLIDO</div>
    <div class="modal-info" id="modal-info"></div>
    <button class="btn btn-primary" onclick="closeModal()">CONTINUAR</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- LIBRERÍAS PROFESIONALES -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
const S = {
  db: null,
  scanner: null,
  isScanning: false,
  lastCode: null,
  scanTimeout: null
};

const $ = id => document.getElementById(id);

// ══════════════════════════════════════════════════
// EXTRACCIÓN DE DATOS (URL -> TEXTO)
// ══════════════════════════════════════════════════
function cleanQR(raw) {
  if (!raw) return '';
  raw = raw.trim();
  // Si es una URL, extraemos el parámetro 'data'
  if (raw.startsWith('http')) {
    try {
      const url = new URL(raw);
      const data = url.searchParams.get('data');
      if (data) return decodeURIComponent(data).trim();
    } catch(e) {
      const m = raw.match(/[?&]data=([^&]*)/);
      if (m) return decodeURIComponent(m[1]).trim();
    }
  }
  return raw;
}

function getField(text, field) {
  const m = text.match(new RegExp(field + ':\\s*([^,]+)'));
  return m ? m[1].trim() : '—';
}

// ══════════════════════════════════════════════════
// BASE DE DATOS (INDEXEDDB)
// ══════════════════════════════════════════════════
function initDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open('ViteocaPro_DB', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      const store = db.createObjectStore('codes', { keyPath: 'id' });
      store.createIndex('status', 'status');
    };
    req.onsuccess = e => { S.db = e.target.result; resolve(); };
  });
}

async function updateStats() {
  const tx = S.db.transaction('codes', 'readonly');
  const store = tx.objectStore('codes');
  
  const total = await new Promise(r => { const req = store.count(); req.onsuccess = () => r(req.result); });
  const used = await new Promise(r => { const req = store.index('status').count('used'); req.onsuccess = () => r(req.result); });
  
  $('stat-total').textContent = total;
  $('stat-valid').textContent = total - used;
  $('stat-used').textContent = used;
  $('btn-clear').style.display = total > 0 ? 'flex' : 'none';
}

// ══════════════════════════════════════════════════
// PROCESAMIENTO DE CSV
// ══════════════════════════════════════════════════
function handleCSV(file) {
  showToast('Procesando archivo...');
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: async (results) => {
      const rows = results.data;
      const tx = S.db.transaction('codes', 'readwrite');
      const store = tx.objectStore('codes');
      let count = 0;

      rows.forEach(row => {
        const raw = row['codigo_qr'] || row['qr_code'];
        if (raw) {
          const clean = cleanQR(raw);
          store.put({
            id: clean,
            status: 'valid',
            name: getField(clean, 'Pasajero') || row['user_id'] || '—',
            compra: getField(clean, 'Compra') || row['compra_id'] || '—',
            raw: raw
          });
          count++;
        }
      });

      tx.oncomplete = () => {
        updateStats();
        const res = $('import-result');
        res.style.display = 'block';
        res.textContent = `✅ ¡Éxito! ${count} códigos cargados correctamente.`;
        showToast('Base de datos actualizada');
        
        // Preview table
        let html = '<table><tr><th>Pasajero</th><th>ID</th></tr>';
        rows.slice(0, 5).forEach(r => {
          const c = cleanQR(r['codigo_qr'] || '');
          html += `<tr><td>${getField(c, 'Pasajero')}</td><td>${c.substring(0,15)}...</td></tr>`;
        });
        $('preview-table').innerHTML = html + '</table>';
        $('preview-card').style.display = 'block';
      };
    }
  });
}

// ══════════════════════════════════════════════════
// MOTOR DE ESCANEO (HTML5-QRCODE)
// ══════════════════════════════════════════════════
async function startScanner() {
  if (S.scanner) return;
  
  S.scanner = new Html5Qrcode("reader");
  const config = { 
    fps: 15, 
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0
  };

  try {
    await S.scanner.start(
      { facingMode: "environment" }, 
      config, 
      onScanSuccess
    );
    $('scan-status').textContent = "Escáner activo";
  } catch (err) {
    $('scan-status').textContent = "Error: No se pudo acceder a la cámara";
    console.error(err);
  }
}

async function onScanSuccess(decodedText) {
  if (S.isScanning) return;
  
  const clean = cleanQR(decodedText);
  if (clean === S.lastCode) return; // Evitar escaneos duplicados inmediatos
  
  S.isScanning = true;
  S.lastCode = clean;
  
  const tx = S.db.transaction('codes', 'readwrite');
  const store = tx.objectStore('codes');
  const req = store.get(clean);
  
  req.onsuccess = () => {
    const rec = req.result;
    if (!rec) {
      showModal('notfound', clean);
    } else if (rec.status === 'used') {
      showModal('used', clean, rec);
    } else {
      rec.status = 'used';
      rec.used_at = new Date().toISOString();
      store.put(rec);
      showModal('valid', clean, rec);
      updateStats();
      addHistory(rec);
    }
  };
  
  // Resetear bloqueo de escaneo tras 3 segundos
  setTimeout(() => { 
    S.isScanning = false; 
    S.lastCode = null;
  }, 3000);
}

// ══════════════════════════════════════════════════
// UI & MODALS
// ══════════════════════════════════════════════════
function showModal(type, id, rec) {
  const m = $('modal');
  const content = $('modal-content');
  const icon = $('modal-icon');
  const title = $('modal-title');
  const info = $('modal-info');
  
  if (type === 'valid') {
    content.style.background = 'var(--c-green-d, #15803D)';
    icon.textContent = '✓';
    title.textContent = 'CÓDIGO VÁLIDO';
    navigator.vibrate?.([100, 50, 100]);
  } else if (type === 'used') {
    content.style.background = 'var(--c-orange-d, #C2410C)';
    icon.textContent = '⚠';
    title.textContent = 'YA UTILIZADO';
    navigator.vibrate?.(200);
  } else {
    content.style.background = 'var(--c-red-d, #B91C1C)';
    icon.textContent = '✗';
    title.textContent = 'NO ENCONTRADO';
    navigator.vibrate?.(500);
  }
  
  let html = `<div class="info-row"><span class="info-label">ID:</span><span class="info-val">${id.substring(0,30)}...</span></div>`;
  if (rec) {
    html += `<div class="info-row"><span class="info-label">Pasajero:</span><span class="info-val">${rec.name}</span></div>`;
    html += `<div class="info-row"><span class="info-label">Compra:</span><span class="info-val">${rec.compra}</span></div>`;
    if (rec.used_at) html += `<div class="info-row"><span class="info-label">Usado el:</span><span class="info-val">${new Date(rec.used_at).toLocaleTimeString()}</span></div>`;
  }
  info.innerHTML = html;
  m.classList.add('show');
}

function closeModal() {
  $('modal').classList.remove('show');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function addHistory(rec) {
  const list = $('history-list');
  if (list.querySelector('.empty-state')) list.innerHTML = '';
  const item = document.createElement('div');
  item.className = 'card';
  item.style.marginBottom = '8px';
  item.innerHTML = `<strong>${rec.name}</strong><br><small style="color:var(--c-muted)">${new Date().toLocaleTimeString()} - ${rec.id.substring(0,20)}...</small>`;
  list.prepend(item);
}

// ══════════════════════════════════════════════════
// EVENTOS & INICIO
// ══════════════════════════════════════════════════
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.nav-tab, .page').forEach(el => el.classList.remove('active'));
    tab.classList.add('active');
    $('page-' + tab.dataset.page).classList.add('active');
    if (tab.dataset.page === 'scanner') startScanner();
    else if (S.scanner) { S.scanner.stop(); S.scanner = null; }
  };
});

$('btn-upload').onclick = () => $('csv-input').click();
$('csv-input').onchange = e => handleCSV(e.target.files[0]);

$('btn-clear').onclick = () => {
  if (confirm('¿Estás seguro de borrar toda la base de datos?')) {
    const tx = S.db.transaction('codes', 'readwrite');
    tx.objectStore('codes').clear();
    tx.oncomplete = () => {
      updateStats();
      $('import-result').style.display = 'none';
      $('preview-card').style.display = 'none';
      showToast('Datos borrados');
    };
  }
};

// Iniciar
initDB().then(() => {
  updateStats();
  startScanner();
});
</script>
</body>
</html>
