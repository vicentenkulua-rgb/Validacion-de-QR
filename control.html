<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003DA5">
    <title>Ferry Viteoca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003DA5;
            --primary-light: #0052CC;
            --accent: #C8102E;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #0a1628;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --text-sec: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 50%, #051a2f 100%);
            color: var(--text);
            line-height: 1.4; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== FONDO MARINO ANIMADO ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 150, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 200, 200, 0.08) 0%, transparent 50%);
            animation: oceanGlow 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes oceanGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0; left: 0;
            width: 200%; height: 100px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100"><defs><linearGradient id="wave" x1="0" x2="0" y1="0" y2="1"><stop offset="0%25" style="stop-color:rgba(0,100,200,0.3);stop-opacity:1" /><stop offset="100%25" style="stop-color:rgba(0,50,100,0.1);stop-opacity:1" /></linearGradient></defs><path d="M0,40 Q300,20 600,40 T1200,40 L1200,100 L0,100 Z" fill="url(%23wave)" /><path d="M0,50 Q300,30 600,50 T1200,50 L1200,100 L0,100 Z" fill="rgba(0,100,200,0.1)" /></svg>') repeat-x;
            animation: wave 15s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        main { position: relative; z-index: 2; }

        /* ===== ANIMACIONES GLOBALES ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes floatWave {
            0%, 100% { transform: translateY(0px) rotateZ(0deg); }
            25% { transform: translateY(-8px) rotateZ(1deg); }
            50% { transform: translateY(-15px) rotateZ(0deg); }
            75% { transform: translateY(-8px) rotateZ(-1deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7), inset 0 0 20px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0), inset 0 0 30px rgba(16, 185, 129, 0.5); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px rgba(0, 150, 255, 0.5), 0 0 10px rgba(0, 200, 200, 0.3); }
            50% { text-shadow: 0 0 15px rgba(0, 150, 255, 0.8), 0 0 25px rgba(0, 200, 200, 0.6); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes shipSail {
            0%, 100% { transform: translateX(0) rotateY(0deg); }
            50% { transform: translateX(3px) rotateY(2deg); }
        }

        @keyframes bubbleRise {
            0% { transform: translateY(0) translateX(0); opacity: 1; }
            100% { transform: translateY(-100px) translateX(20px); opacity: 0; }
        }

        @keyframes waterDrop {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(30px) scale(0); opacity: 0; }
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, rgba(0, 61, 165, 0.95) 0%, rgba(0, 82, 204, 0.95) 50%, rgba(0, 61, 165, 0.95) 100%);
            color: white;
            padding: 12px 16px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 150, 255, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0, 200, 200, 0.3);
            animation: slideInDown 0.6s ease-out;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
            animation: shimmer 3s infinite;
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 700; 
            font-size: 16px;
            animation: slideInLeft 0.6s ease-out;
            position: relative;
            z-index: 2;
        }

        .logo i { 
            font-size: 18px;
            animation: shipSail 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(0, 200, 200, 0.6));
        }

        .header-right { 
            display: flex; 
            gap: 10px; 
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .status-badge {
            display: flex; 
            align-items: center; 
            gap: 5px;
            font-size: 11px; 
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            padding: 4px 10px; 
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out 0.2s both;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 200, 200, 0.4);
        }

        .status-badge:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 200, 200, 0.5);
            border-color: rgba(0, 200, 200, 0.8);
        }

        .dot { 
            width: 6px; 
            height: 6px; 
            border-radius: 50%; 
            background: #CBD5E1; 
            transition: all 0.3s ease;
        }

        .dot.online { 
            background: #22C55E;
            animation: pulseGlow 2s infinite;
        }

        .btn-header {
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(0, 200, 200, 0.3);
            color: white;
            width: 32px; 
            height: 32px; 
            border-radius: 8px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 14px; 
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .btn-header::before {
            content: '';
            position: absolute;
            top: 0; 
            left: -100%;
            width: 100%; 
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(0, 200, 200, 0.4) 50%, transparent 100%);
            transition: left 0.5s ease;
        }

        .btn-header:hover {
            background: rgba(0, 200, 200, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 200, 200, 0.4);
            border-color: rgba(0, 200, 200, 0.8);
        }

        .btn-header:hover::before { 
            left: 100%; 
        }

        .btn-header:active { 
            background: rgba(0, 200, 200, 0.15);
            transform: translateY(0);
        }

        .btn-header.loading i {
            animation: spin 1s linear infinite;
        }

        /* ===== MAIN CONTENT ===== */
        main { 
            padding: 12px 12px 80px 12px; 
            max-width: 1200px; 
            margin: 0 auto;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            background: linear-gradient(135deg, rgba(0, 61, 165, 0.9) 0%, rgba(0, 82, 204, 0.9) 50%, rgba(0, 100, 220, 0.9) 100%);
            color: white; 
            padding: 12px 14px; 
            border-radius: 15px;
            margin-bottom: 12px; 
            box-shadow: 0 15px 50px rgba(0, 150, 255, 0.4);
            position: relative; 
            overflow: hidden;
            animation: slideInUp 0.7s ease-out;
            border: 1px solid rgba(0, 200, 200, 0.3);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events: none;
            animation: oceanGlow 6s ease-in-out infinite;
        }

        .hero::after {
            content: '\f21a'; 
            font-family: 'Font Awesome 6 Free'; 
            font-weight: 900;
            position: absolute; 
            right: -20px; 
            bottom: -20px;
            font-size: 120px; 
            opacity: 0.12;
            animation: floatWave 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 200, 200, 0.3));
        }

        .hero-content { 
            position: relative; 
            z-index: 1;
        }

        .hero h2 { 
            font-size: 16px; 
            font-weight: 700; 
            margin-bottom: 6px;
            animation: slideInLeft 0.7s ease-out 0.1s both;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hero-info { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            font-size: 11px;
        }

        .hero-info-item {
            background: rgba(255,255,255,0.12); 
            padding: 6px 10px; 
            border-radius: 8px;
            display: flex; 
            align-items: center; 
            gap: 5px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 200, 200, 0.3);
            position: relative;
            overflow: hidden;
        }

        .hero-info-item::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(0, 200, 200, 0.2) 50%, transparent 100%);
            transition: left 0.5s ease;
        }

        .hero-info-item:hover {
            background: rgba(0, 200, 200, 0.15);
            transform: translateY(-2px);
            border-color: rgba(0, 200, 200, 0.6);
            box-shadow: 0 4px 15px rgba(0, 200, 200, 0.3);
        }

        .hero-info-item:hover::before {
            left: 100%;
        }

        .hero-info-label { opacity: 0.8; font-weight: 500; }
        .hero-info-value { font-weight: 700; }

        /* ===== KPI GRID ===== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .kpi {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 245, 255, 0.95) 100%);
            padding: 10px; 
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 150, 255, 0.2);
            border-left: 4px solid var(--primary);
            min-width: 0;
            animation: scaleIn 0.5s ease-out;
            animation-fill-mode: both;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .kpi::before {
            content: '';
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background: linear-gradient(135deg, transparent 0%, rgba(0, 150, 255, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .kpi::after {
            content: '';
            position: absolute;
            bottom: -50%;
            right: -50%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0, 200, 200, 0.3) 0%, transparent 70%);
            animation: float 4s ease-in-out infinite;
        }

        .kpi:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 200, 200, 0.4);
        }

        .kpi:hover::before {
            opacity: 1;
        }

        .kpi:nth-child(1) { animation-delay: 0.1s; }
        .kpi:nth-child(2) { animation-delay: 0.2s; }
        .kpi:nth-child(3) { animation-delay: 0.3s; }
        .kpi:nth-child(4) { animation-delay: 0.4s; }

        .kpi.success { border-left-color: var(--success); }
        .kpi.warning { border-left-color: var(--warning); }

        .kpi-label {
            font-size: 10px; 
            color: var(--text-sec); 
            font-weight: 600;
            text-transform: uppercase; 
            letter-spacing: 0.2px; 
            margin-bottom: 3px;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }

        .kpi-value { 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--text);
            animation: scaleIn 0.6s ease-out 0.3s both;
        }

        .kpi-sub { 
            font-size: 9px; 
            color: var(--text-sec); 
            margin-top: 2px;
        }

        /* ===== SECTIONS ===== */
        .section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(240, 245, 255, 0.98) 100%);
            border-radius: 15px;
            margin-bottom: 12px; 
            box-shadow: 0 10px 40px rgba(0, 150, 255, 0.2);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
            transition: all 0.4s ease;
            border: 1px solid rgba(0, 200, 200, 0.2);
            position: relative;
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 100% 0%, rgba(0, 200, 200, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .section:hover {
            box-shadow: 0 20px 60px rgba(0, 200, 200, 0.3);
            transform: translateY(-4px);
        }

        .section-header {
            padding: 12px 14px; 
            border-bottom: 2px solid rgba(0, 150, 255, 0.2);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: linear-gradient(135deg, rgba(240, 245, 255, 1) 0%, rgba(220, 240, 255, 1) 100%);
            animation: slideInDown 0.5s ease-out;
        }

        .section-title { 
            font-size: 13px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            color: var(--primary);
        }

        .section-title i { 
            font-size: 12px;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 0 8px rgba(0, 150, 255, 0.4));
        }

        /* ===== TARJETAS MÓVIL ===== */
        .ticket-cards { 
            display: flex; 
            flex-direction: column;
        }

        .ticket-card {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.15);
            animation: fadeIn 0.5s ease-out;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .ticket-card::before {
            content: '';
            position: absolute;
            left: 0; 
            top: 0;
            width: 3px; 
            height: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--success) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .ticket-card:hover {
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.08) 0%, rgba(16, 185, 129, 0.08) 100%);
            transform: translateX(4px);
            box-shadow: inset 0 0 20px rgba(0, 200, 200, 0.1);
        }

        .ticket-card:hover::before {
            opacity: 1;
        }

        .ticket-card:last-child { border-bottom: none; }

        .ticket-card-header {
            display: flex; 
            align-items: center; 
            gap: 7px;
            font-weight: 700; 
            font-size: 13px; 
            margin-bottom: 10px;
            color: var(--primary);
        }

        .ticket-card-header i { 
            font-size: 12px; 
            color: var(--text-sec);
            animation: bounce 1.5s infinite;
            filter: drop-shadow(0 0 6px rgba(0, 150, 255, 0.3));
        }

        .ticket-card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .ticket-stat-box {
            background: linear-gradient(135deg, rgba(240, 245, 255, 1) 0%, rgba(220, 240, 255, 1) 100%);
            border-radius: 10px;
            padding: 8px 10px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(0, 150, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .ticket-stat-box::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(0, 200, 200, 0.2) 50%, transparent 100%);
            transition: left 0.5s ease;
        }

        .ticket-stat-box:hover {
            border-color: rgba(0, 150, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 150, 255, 0.2);
        }

        .ticket-stat-box:hover::before {
            left: 100%;
        }

        .tsb-label {
            font-size: 10px; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 0.3px; 
            color: var(--text-sec); 
            margin-bottom: 3px;
        }

        .tsb-value { 
            font-size: 15px; 
            font-weight: 700;
            animation: scaleIn 0.5s ease-out;
        }

        .tsb-value.green { color: #059669; }
        .tsb-value.blue  { color: var(--primary); }
        .tsb-value.dark  { color: var(--text); }

        /* ===== TABLA DESKTOP ===== */
        .ticket-table-wrap { display: none; }

        .ticket-table { 
            width: 100%; 
            border-collapse: collapse;
        }

        .ticket-table thead tr { 
            background: linear-gradient(135deg, rgba(240, 245, 255, 1) 0%, rgba(220, 240, 255, 1) 100%);
        }

        .ticket-table th {
            padding: 12px 16px; 
            text-align: left;
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase;
            color: var(--text-sec); 
            letter-spacing: 0.4px;
            border-bottom: 2px solid rgba(0, 150, 255, 0.2);
        }

        .ticket-table th:not(:first-child) { text-align: right; }

        .ticket-table td {
            padding: 14px 16px; 
            border-bottom: 1px solid rgba(0, 150, 255, 0.15);
            font-size: 13px; 
            vertical-align: middle;
            transition: all 0.3s ease;
        }

        .ticket-table td:not(:first-child) { 
            text-align: right; 
            font-weight: 600;
        }

        .ticket-table tr:last-child td { border-bottom: none; }

        .ticket-table tbody tr {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .ticket-table tbody tr:hover {
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.08) 0%, rgba(16, 185, 129, 0.08) 100%);
            transform: scale(1.01);
        }

        .ticket-table tbody tr:hover td { 
            background: transparent;
            box-shadow: inset 0 0 0 1px rgba(0, 150, 255, 0.3);
        }

        .ticket-name { 
            font-weight: 700; 
            font-size: 13px; 
            display: flex; 
            align-items: center; 
            gap: 7px;
            color: var(--primary);
        }

        .ticket-name i { 
            font-size: 12px; 
            color: var(--text-sec);
            filter: drop-shadow(0 0 6px rgba(0, 150, 255, 0.3));
        }

        .val-disponible { color: #059669; font-weight: 700; }
        .val-vendido    { color: var(--primary); font-weight: 700; }

        .grand-total {
            background: linear-gradient(135deg, var(--primary) 0%, #0052CC 50%, #003DA5 100%);
            color: white;
            padding: 12px 14px; 
            text-align: center;
            font-weight: 700; 
            font-size: 14px;
            animation: slideInUp 0.6s ease-out;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 150, 255, 0.3);
            border: 1px solid rgba(0, 200, 200, 0.3);
        }

        .grand-total::before {
            content: '';
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events: none;
            animation: oceanGlow 6s ease-in-out infinite;
        }

        .grand-total:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0, 200, 200, 0.4);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.7);
            display: none; 
            align-items: center; 
            justify-content: center;
            z-index: 1000; 
            padding: 16px;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-overlay.active { 
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(240, 245, 255, 0.98) 100%);
            width: 100%; 
            max-width: 500px;
            border-radius: 20px; 
            box-shadow: 0 25px 80px rgba(0, 150, 255, 0.4);
            animation: slideInUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            border: 1px solid rgba(0, 200, 200, 0.3);
        }

        .modal-header { 
            padding: 16px; 
            border-bottom: 2px solid rgba(0, 150, 255, 0.2); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: linear-gradient(135deg, rgba(240, 245, 255, 1) 0%, rgba(220, 240, 255, 1) 100%);
            animation: slideInDown 0.4s ease-out;
        }

        .modal-header h3 { 
            font-size: 16px; 
            font-weight: 700;
            color: var(--primary);
        }

        .modal-close { 
            background: none; 
            border: none; 
            font-size: 18px; 
            cursor: pointer; 
            color: var(--text-sec);
            transition: all 0.3s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .modal-close:hover {
            background: rgba(0, 150, 255, 0.1);
            color: var(--primary);
            transform: rotate(90deg);
        }

        .modal-body { 
            padding: 16px;
            animation: fadeIn 0.5s ease-out 0.1s both;
        }

        .form-group { 
            margin-bottom: 14px;
            animation: slideInLeft 0.5s ease-out;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }

        .form-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: 600; 
            margin-bottom: 5px;
            color: var(--primary);
        }

        .form-control {
            width: 100%; 
            padding: 10px 12px;
            border: 1.5px solid rgba(0, 150, 255, 0.3); 
            border-radius: 10px;
            font-size: 14px; 
            font-family: inherit; 
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(240, 245, 255, 0.8);
        }

        .form-control:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(0, 150, 255, 0.2);
            transform: scale(1.02);
            background: rgba(240, 245, 255, 1);
        }

        .modal-footer { 
            padding: 14px 16px; 
            border-top: 2px solid rgba(0, 150, 255, 0.2); 
            display: flex; 
            gap: 10px;
            background: rgba(240, 245, 255, 0.8);
            animation: slideInUp 0.4s ease-out;
        }

        .btn { 
            flex: 1; 
            padding: 10px 16px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 13px; 
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%; 
            left: 50%;
            width: 0; 
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary) 0%, #0052CC 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(0, 150, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 150, 255, 0.5);
        }

        .btn-ghost { 
            background: rgba(240, 245, 255, 1); 
            color: var(--text);
            border: 1px solid rgba(0, 150, 255, 0.3);
        }

        .btn-ghost:hover {
            background: rgba(0, 150, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(0, 150, 255, 0.6);
        }

        .alert { 
            padding: 10px 14px; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            font-size: 12px; 
            display: none;
            animation: slideInDown 0.4s ease-out;
            border-left: 4px solid;
        }

        .alert-danger { 
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            color: #991B1B; 
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-left-color: #EF4444;
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.2);
        }

        .empty-state { 
            text-align: center; 
            padding: 20px 14px; 
            color: var(--text-sec); 
            font-size: 12px;
            animation: fadeIn 0.5s ease-out;
        }

        /* ===== DESKTOP ===== */
        @media (min-width: 768px) {
            header  { padding: 16px 24px; }
            main    { padding: 20px 24px 40px; }
            .hero   { padding: 16px 20px; margin-bottom: 20px; }
            .hero h2 { font-size: 18px; }
            .hero-info { grid-template-columns: repeat(4, 1fr); gap: 12px; }
            .hero-info-item { padding: 8px 12px; font-size: 12px; }

            .kpi-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px; 
                margin-bottom: 20px;
            }
            .kpi { padding: 16px; }
            .kpi-label { font-size: 12px; }
            .kpi-value { font-size: 24px; }
            .kpi-sub   { font-size: 10px; }

            .section { margin-bottom: 20px; }
            .section-header { padding: 16px; }
            .section-title  { font-size: 14px; }

            .ticket-cards      { display: none; }
            .ticket-table-wrap { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-ship"></i>
            <span>Ferry Viteoca</span>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div id="statusDot" class="dot"></div>
                <span id="statusText">Offline</span>
            </div>
            <button class="btn-header" onclick="openModal()" title="Configurar">
                <i class="fas fa-cog"></i>
            </button>
            <button class="btn-header" id="syncBtn" onclick="loadAll()" title="Actualizar">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <main>
        <div id="errorAlert" class="alert alert-danger"></div>

        <div class="hero">
            <div class="hero-content">
                <h2 id="viajeDestino">Cargando viaje...</h2>
                <div class="hero-info">
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="far fa-calendar"></i> Fecha</span>
                        <span class="hero-info-value" id="viajeFecha">—</span>
                    </div>
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="far fa-clock"></i> Hora</span>
                        <span class="hero-info-value" id="viajeHora">—</span>
                    </div>
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="fas fa-info-circle"></i> Estado</span>
                        <span class="hero-info-value" id="viajeEstado">—</span>
                    </div>
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="far fa-clock"></i> Actualizado</span>
                        <span class="hero-info-value" id="lastUpdate">—</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPIs: 4 (2x2 móvil, fila de 4 en desktop) -->
        <div class="kpi-grid">
            <div class="kpi success">
                <div class="kpi-label"><i class="fas fa-check"></i> Vendidos</div>
                <div class="kpi-value" id="kpi-vendidos">0</div>
                <div class="kpi-sub">Billetes totales</div>
            </div>
            <div class="kpi warning">
                <div class="kpi-label"><i class="fas fa-wallet"></i> Ingresos</div>
                <div class="kpi-value" id="kpi-ingresos" style="font-size: 15px;">0</div>
                <div class="kpi-sub">XAF total</div>
            </div>
            <div class="kpi warning">
                <div class="kpi-label"><i class="fas fa-users"></i> Disponibles</div>
                <div class="kpi-value" id="kpi-disponibles">0</div>
                <div class="kpi-sub">Plazas libres</div>
            </div>
            <div class="kpi">
                <div class="kpi-label"><i class="fas fa-box-open"></i> Stock Total</div>
                <div class="kpi-value" id="kpi-stock">0</div>
                <div class="kpi-sub">Capacidad total</div>
            </div>
        </div>

        <!-- DESGLOSE DE BILLETES -->
        <div class="section">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-ticket-alt"></i> Desglose de Billetes</h3>
            </div>

            <!-- MÓVIL: tarjetas -->
            <div class="ticket-cards" id="ticketCards">
                <div class="empty-state">Cargando inventario...</div>
            </div>

            <!-- DESKTOP: tabla -->
            <div class="ticket-table-wrap" id="ticketTableWrap">
                <div class="empty-state">Cargando inventario...</div>
            </div>
        </div>

        <!-- TOTAL GENERAL -->
        <div class="section">
            <div class="grand-total" id="grandTotal">
                <i class="fas fa-calculator" style="margin-right:8px;"></i>Total General: 0 XAF
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-database" style="color:var(--primary);margin-right:8px;"></i>Supabase</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL del Proyecto</label>
                    <input type="text" id="inputUrl" class="form-control" placeholder="https://xxxxx.supabase.co">
                </div>
                <div class="form-group">
                    <label>Clave Anon</label>
                    <input type="password" id="inputKey" class="form-control" placeholder="Clave...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveConfig()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let SUPABASE_URL = localStorage.getItem('fv_url') || '';
        let SUPABASE_KEY = localStorage.getItem('fv_key') || '';
        let destinoActual = null;

        const formatXAF = (n) => new Intl.NumberFormat('es-GQ').format(Math.round(n));
        const formatFecha = (f) => {
            if (!f) return '—';
            return new Date(f).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
        };
        const formatHora = (h) => h ? h.slice(0, 5) : '—';

        const showAlert = (msg) => {
            const el = document.getElementById('errorAlert');
            if (msg) { el.textContent = msg; el.style.display = 'block'; updateStatus(false); }
            else { el.style.display = 'none'; }
        };

        const updateStatus = (online) => {
            document.getElementById('statusDot').className   = online ? 'dot online' : 'dot';
            document.getElementById('statusText').textContent = online ? 'Online' : 'Offline';
        };

        function openModal() {
            document.getElementById('inputUrl').value = SUPABASE_URL;
            document.getElementById('inputKey').value = SUPABASE_KEY;
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function saveConfig() {
            const url = document.getElementById('inputUrl').value.trim().replace(/\/$/, '');
            const key = document.getElementById('inputKey').value.trim();
            if (!url || !key) { alert('Completa ambos campos'); return; }
            SUPABASE_URL = url; SUPABASE_KEY = key;
            localStorage.setItem('fv_url', url);
            localStorage.setItem('fv_key', key);
            closeModal(); loadAll();
        }

        async function querySupabase(table, params = '') {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            if (!res.ok) throw new Error(`Error ${res.status}`);
            return await res.json();
        }

        async function loadViaje() {
            const viajes = await querySupabase('viajes', 'activo=eq.true&limit=1');
            const v = viajes[0];
            if (!v) { document.getElementById('viajeDestino').textContent = 'Sin viajes activos'; return; }
            destinoActual = v.destino;
            document.getElementById('viajeDestino').textContent = v.destino;
            document.getElementById('viajeFecha').textContent   = formatFecha(v.fecha_salida);
            document.getElementById('viajeHora').textContent    = formatHora(v.hora_salida);
            document.getElementById('viajeEstado').textContent  = v.estado;
        }

        async function loadInventario() {
            const cards     = document.getElementById('ticketCards');
            const tableWrap = document.getElementById('ticketTableWrap');

            if (!destinoActual) {
                const msg = '<div class="empty-state">Sin viaje activo</div>';
                cards.innerHTML = msg; tableWrap.innerHTML = msg;
                return;
            }

            const inv = await querySupabase('inventario',
                `destino=eq.${encodeURIComponent(destinoActual)}&order=precio.desc`);

            const compras = await querySupabase('compras',
                `destino=eq.${encodeURIComponent(destinoActual)}&select=tipo_billete,precio,estado_compra`);

            const vpt = {};
            compras.forEach(c => {
                if (!vpt[c.tipo_billete]) vpt[c.tipo_billete] = { vendidos: 0, monto: 0 };
                if (c.estado_compra === 'Billete pagado') {
                    vpt[c.tipo_billete].vendidos++;
                    vpt[c.tipo_billete].monto += c.precio || 0;
                }
            });

            let totalVendidos = 0, totalIngresos = 0, totalDisponibles = 0, totalCapacidad = 0;

            const iconoMap = {
                'Economico': 'fa-chair',
                'VIP':       'fa-crown',
                'Cabina':    'fa-door-closed'
            };

            let htmlCards = '';
            let htmlFilas = '';

            inv.forEach(i => {
                const tipo        = i.tipo_billete;
                const disponibles = i.stock_disponible || 0;
                const vendidos    = vpt[tipo]?.vendidos || 0;
                const monto       = vpt[tipo]?.monto    || 0;
                const precio      = i.precio || 0;
                const capacidad   = (i.stock_disponible || 0) + (i.stock_reservado || 0) + (i.stock_vendido || 0);
                const icono       = iconoMap[tipo] || 'fa-ticket-alt';

                totalVendidos    += vendidos;
                totalIngresos    += monto;
                totalDisponibles += disponibles;
                totalCapacidad   += capacidad;

                // Tarjeta móvil
                htmlCards += `
                    <div class="ticket-card">
                        <div class="ticket-card-header">
                            <i class="fas ${icono}"></i>${tipo}
                        </div>
                        <div class="ticket-card-grid">
                            <div class="ticket-stat-box">
                                <div class="tsb-label">Disponible</div>
                                <div class="tsb-value green">${disponibles}</div>
                            </div>
                            <div class="ticket-stat-box">
                                <div class="tsb-label">Vendido</div>
                                <div class="tsb-value blue">${vendidos}</div>
                            </div>
                            <div class="ticket-stat-box">
                                <div class="tsb-label">Precio unit.</div>
                                <div class="tsb-value dark">${formatXAF(precio)} XAF</div>
                            </div>
                            <div class="ticket-stat-box">
                                <div class="tsb-label">Total vendido</div>
                                <div class="tsb-value dark">${formatXAF(monto)} XAF</div>
                            </div>
                        </div>
                    </div>`;

                // Fila tabla desktop
                htmlFilas += `
                    <tr>
                        <td><span class="ticket-name"><i class="fas ${icono}"></i>${tipo}</span></td>
                        <td class="val-disponible">${disponibles}</td>
                        <td class="val-vendido">${vendidos}</td>
                        <td>${formatXAF(precio)} XAF</td>
                        <td>${formatXAF(monto)} XAF</td>
                    </tr>`;
            });

            cards.innerHTML = htmlCards;

            tableWrap.innerHTML = `
                <table class="ticket-table">
                    <thead>
                        <tr>
                            <th>Tipo de billete</th>
                            <th>Disponible</th>
                            <th>Vendido</th>
                            <th>Precio unit.</th>
                            <th>Total vendido</th>
                        </tr>
                    </thead>
                    <tbody>${htmlFilas}</tbody>
                </table>`;

            // Actualizar KPIs
            document.getElementById('kpi-vendidos').textContent    = totalVendidos;
            document.getElementById('kpi-ingresos').textContent    = formatXAF(totalIngresos);
            document.getElementById('kpi-disponibles').textContent = totalDisponibles;
            document.getElementById('kpi-stock').textContent       = totalCapacidad;

            document.getElementById('grandTotal').innerHTML =
                `<i class="fas fa-calculator" style="margin-right:8px;"></i>Total General: ${formatXAF(totalIngresos)} XAF`;

            document.getElementById('lastUpdate').textContent =
                new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }

        async function loadAll() {
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.querySelector('i').classList.add('loading');
            
            if (!SUPABASE_URL || !SUPABASE_KEY) {
                showAlert('Configura Supabase en ⚙');
                updateStatus(false);
                syncBtn.querySelector('i').classList.remove('loading');
                return;
            }
            showAlert(null);
            try {
                await loadViaje();
                await loadInventario();
                updateStatus(true);
            } catch (err) {
                showAlert('Error de conexión. Verifica credenciales.');
            } finally {
                syncBtn.querySelector('i').classList.remove('loading');
            }
        }

        window.addEventListener('load', () => {
            if (!SUPABASE_URL || !SUPABASE_KEY) { openModal(); }
            else { loadAll(); }
            setInterval(loadAll, 120000);
        });
    </script>
</body>
</html>
