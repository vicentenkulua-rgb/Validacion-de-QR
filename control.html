<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003DA5">
    <title>Ferry Viteoca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003DA5;
            --primary-light: #0052CC;
            --accent: #C8102E;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F1F3F6;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --text-sec: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER COMPACTO --- */
        header {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
        }

        .logo i { font-size: 18px; }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #CBD5E1;
        }

        .dot.online {
            background: #22C55E;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn-header {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-header:active { background: rgba(255,255,255,0.2); }

        /* --- MAIN CONTENT --- */
        main {
            padding: 12px 12px 80px 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- HERO COMPACTO --- */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #0052CC 100%);
            color: white;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: '\f21a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 80px;
            opacity: 0.08;
        }

        .hero h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .hero p {
            font-size: 12px;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .hero-stat {
            background: rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 10px;
            backdrop-filter: blur(5px);
        }

        .hero-stat-val {
            font-size: 13px;
            font-weight: 700;
            display: block;
            margin-top: 2px;
        }

        /* --- KPI GRID ULTRA-COMPACTO --- */
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .kpi {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            border-left: 3px solid var(--primary);
        }

        .kpi.success { border-left-color: var(--success); }
        .kpi.warning { border-left-color: var(--warning); }
        .kpi.danger { border-left-color: var(--danger); }

        .kpi-label {
            font-size: 11px;
            color: var(--text-sec);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .kpi-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .kpi-sub {
            font-size: 10px;
            color: var(--text-sec);
            margin-top: 2px;
        }

        /* --- SECCIONES COMPACTAS --- */
        .section {
            background: var(--card);
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F8FAFC;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title i { font-size: 12px; }

        .section-body {
            padding: 0;
        }

        /* --- TABLA COMPACTA --- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background: #F8FAFC;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-sec);
            letter-spacing: 0.3px;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        tr:last-child td { border-bottom: none; }

        /* --- BADGES --- */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }
        .badge-info { background: #DBEAFE; color: #1E40AF; }

        /* --- BARRA DE PROGRESO --- */
        .progress {
            width: 100%;
            height: 5px;
            background: #E5E7EB;
            border-radius: 10px;
            overflow: hidden;
            margin: 4px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease;
        }

        /* --- LISTA DE PAGOS --- */
        .payment-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .payment-item:last-child { border-bottom: none; }

        .payment-info { flex: 1; }
        .payment-user { font-weight: 600; display: block; margin-bottom: 2px; }
        .payment-meta { font-size: 10px; color: var(--text-sec); }
        .payment-amount { font-weight: 700; text-align: right; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-sec);
        }

        .modal-body {
            padding: 16px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 61, 165, 0.1);
        }

        .modal-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:active { background: #002D7A; }

        .btn-ghost {
            background: var(--bg);
            color: var(--text);
        }

        .btn-ghost:active { background: #E5E7EB; }

        /* --- ALERT --- */
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .alert-danger {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
        }

        /* --- LOADING --- */
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #E5E7EB;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 20px 14px;
            color: var(--text-sec);
            font-size: 12px;
        }

        /* --- RESPONSIVE DESKTOP --- */
        @media (min-width: 768px) {
            header {
                padding: 16px 24px;
            }

            main {
                padding: 20px 24px 40px;
            }

            .hero {
                padding: 20px 24px;
                margin-bottom: 20px;
            }

            .hero h2 { font-size: 20px; }
            .hero p { font-size: 13px; }

            .kpi-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin-bottom: 20px;
            }

            .kpi {
                padding: 16px;
            }

            .kpi-label { font-size: 12px; }
            .kpi-value { font-size: 24px; }

            .section {
                margin-bottom: 20px;
            }

            .section-header {
                padding: 16px;
            }

            .section-title { font-size: 14px; }

            .section-body {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 0;
            }

            .section-body > :first-child {
                border-right: 1px solid var(--border);
            }

            table {
                font-size: 13px;
            }

            th {
                padding: 12px 16px;
                font-size: 11px;
            }

            td {
                padding: 12px 16px;
            }

            .modal {
                max-width: 600px;
            }
        }

        @media (min-width: 1024px) {
            .kpi-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <i class="fas fa-ship"></i>
            <span>Ferry Viteoca</span>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div id="statusDot" class="dot"></div>
                <span id="statusText">Offline</span>
            </div>
            <button class="btn-header" onclick="openModal()" title="Configurar">
                <i class="fas fa-cog"></i>
            </button>
            <button class="btn-header" onclick="loadAll()" title="Actualizar">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <main>
        <div id="errorAlert" class="alert alert-danger"></div>

        <!-- HERO COMPACTO -->
        <div class="hero">
            <h2 id="viajeDestino">Cargando...</h2>
            <p id="viajeDetalle">—</p>
            <div class="hero-stats" id="heroStats">
                <!-- Dinámico -->
            </div>
        </div>

        <!-- KPI GRID -->
        <div class="kpi-grid">
            <div class="kpi success">
                <div class="kpi-label"><i class="fas fa-check"></i> Pagados</div>
                <div class="kpi-value" id="kpi-pagados">0</div>
                <div class="kpi-sub" id="kpi-pagados-sub">—</div>
            </div>
            <div class="kpi warning">
                <div class="kpi-label"><i class="fas fa-wallet"></i> Ingresos</div>
                <div class="kpi-value" id="kpi-ingresos" style="font-size: 16px;">0</div>
                <div class="kpi-sub">XAF</div>
            </div>
            <div class="kpi warning">
                <div class="kpi-label"><i class="fas fa-clock"></i> Pendientes</div>
                <div class="kpi-value" id="kpi-pendientes">0</div>
                <div class="kpi-sub">Por pagar</div>
            </div>
            <div class="kpi danger">
                <div class="kpi-label"><i class="fas fa-users"></i> Stock</div>
                <div class="kpi-value" id="kpi-stock">0</div>
                <div class="kpi-sub">Disponibles</div>
            </div>
        </div>

        <!-- INVENTARIO -->
        <div class="section">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-boxes"></i> Inventario</h3>
                <span id="lastUpdate" style="font-size: 10px; color: var(--text-sec);"></span>
            </div>
            <div class="section-body">
                <div style="overflow-x: auto;">
                    <table id="inventarioTable">
                        <thead>
                            <tr>
                                <th>Billete</th>
                                <th>Precio</th>
                                <th>Ventas</th>
                                <th>Libres</th>
                            </tr>
                        </thead>
                        <tbody id="inventarioBody">
                            <tr><td colspan="4" class="empty-state">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PAGOS RECIENTES -->
        <div class="section">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-history"></i> Pagos Recientes</h3>
            </div>
            <div class="section-body" id="pagosContainer">
                <div class="empty-state">Cargando pagos...</div>
            </div>
        </div>

        <!-- COMPRAS -->
        <div class="section">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-shopping-cart"></i> Compras</h3>
            </div>
            <div class="section-body">
                <div style="overflow-x: auto;">
                    <table id="comprasTable">
                        <thead>
                            <tr>
                                <th>Pasajero</th>
                                <th>Destino</th>
                                <th>Precio</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="comprasBody">
                            <tr><td colspan="4" class="empty-state">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL CONFIGURACIÓN -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-database" style="color: var(--primary); margin-right: 8px;"></i>Supabase</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL del Proyecto</label>
                    <input type="text" id="inputUrl" class="form-control" placeholder="https://xxxxx.supabase.co">
                </div>
                <div class="form-group">
                    <label>Clave Anon</label>
                    <input type="password" id="inputKey" class="form-control" placeholder="Clave...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveConfig()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        let SUPABASE_URL = localStorage.getItem('fv_url') || '';
        let SUPABASE_KEY = localStorage.getItem('fv_key') || '';
        let destinoActual = null;

        // --- UTILIDADES ---
        const formatXAF = (n) => new Intl.NumberFormat('es-GQ').format(Math.round(n));
        
        const formatFecha = (f) => {
            if (!f) return '—';
            const d = new Date(f);
            return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
        };

        const showAlert = (msg) => {
            const el = document.getElementById('errorAlert');
            if (msg) {
                el.textContent = msg;
                el.style.display = 'block';
                updateStatus(false);
            } else {
                el.style.display = 'none';
            }
        };

        const updateStatus = (online) => {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (online) {
                dot.className = 'dot online';
                text.textContent = 'Online';
            } else {
                dot.className = 'dot';
                text.textContent = 'Offline';
            }
        };

        // --- MODAL ---
        function openModal() {
            document.getElementById('inputUrl').value = SUPABASE_URL;
            document.getElementById('inputKey').value = SUPABASE_KEY;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function saveConfig() {
            const url = document.getElementById('inputUrl').value.trim().replace(/\/$/, '');
            const key = document.getElementById('inputKey').value.trim();
            
            if (!url || !key) {
                alert('Completa ambos campos');
                return;
            }

            SUPABASE_URL = url;
            SUPABASE_KEY = key;
            localStorage.setItem('fv_url', url);
            localStorage.setItem('fv_key', key);
            closeModal();
            loadAll();
        }

        // --- API ---
        async function querySupabase(table, params = '') {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error(`Error ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`Error en ${table}:`, error);
                throw error;
            }
        }

        // --- CARGA DE DATOS ---
        async function loadViaje() {
            const viajes = await querySupabase('viajes', 'activo=eq.true&limit=1');
            const v = viajes[0];
            if (!v) {
                document.getElementById('viajeDestino').textContent = 'Sin viajes activos';
                document.getElementById('viajeDetalle').textContent = '—';
                return;
            }
            destinoActual = v.destino;
            const fecha = new Date(v.fecha_salida).toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short' });
            document.getElementById('viajeDestino').textContent = `${v.destino}`;
            document.getElementById('viajeDetalle').textContent = `${fecha} • ${v.hora_salida?.slice(0,5)} • ${v.estado}`;
        }

        async function loadKPIs() {
            const [compras, inv] = await Promise.all([
                querySupabase('compras', 'select=estado_compra,precio'),
                querySupabase('inventario', destinoActual ? `destino=eq.${encodeURIComponent(destinoActual)}` : '')
            ]);

            const pagados = compras.filter(c => c.estado_compra === 'Billete pagado');
            const pendientes = compras.filter(c => c.estado_compra === 'pendiente_pago');
            const expirados = compras.filter(c => c.estado_compra === 'billete_expirado');
            const ingresos = pagados.reduce((s, c) => s + (c.precio || 0), 0);
            const totalStock = inv.reduce((s, i) => s + (i.stock_disponible || 0), 0);

            document.getElementById('kpi-pagados').textContent = pagados.length;
            document.getElementById('kpi-pagados-sub').textContent = `${expirados.length} expirados`;
            document.getElementById('kpi-ingresos').textContent = formatXAF(ingresos);
            document.getElementById('kpi-pendientes').textContent = pendientes.length;
            document.getElementById('kpi-stock').textContent = totalStock;
        }

        async function loadInventario() {
            const container = document.getElementById('inventarioBody');
            if (!destinoActual) {
                container.innerHTML = '<tr><td colspan="4" class="empty-state">Sin viaje activo</td></tr>';
                return;
            }

            const inv = await querySupabase('inventario', `destino=eq.${encodeURIComponent(destinoActual)}&order=tipo_billete`);
            
            container.innerHTML = inv.map(i => {
                const total = (i.stock_disponible || 0) + (i.stock_reservado || 0) + (i.stock_vendido || 0);
                const pct = total > 0 ? Math.round(((i.stock_vendido || 0) / total) * 100) : 0;
                let fillColor = '#10B981';
                if (pct > 60) fillColor = '#F59E0B';
                if (pct > 85) fillColor = '#EF4444';

                return `
                    <tr>
                        <td><strong>${i.tipo_billete}</strong></td>
                        <td>${formatXAF(i.precio)}</td>
                        <td>
                            <div class="progress">
                                <div class="progress-fill" style="width:${pct}%; background:${fillColor}"></div>
                            </div>
                            <span style="font-size:10px; color:var(--text-sec)">${pct}%</span>
                        </td>
                        <td><span class="badge ${i.stock_disponible > 5 ? 'badge-success' : 'badge-danger'}">${i.stock_disponible}</span></td>
                    </tr>
                `;
            }).join('');
        }

        async function loadPagos() {
            const container = document.getElementById('pagosContainer');
            const pagos = await querySupabase('pagos', 'select=monto_detectado,telefono_remitente,metodo_pago,fecha_pago,verificado&order=fecha_pago.desc&limit=5');
            
            if (!pagos.length) {
                container.innerHTML = '<div class="empty-state">Sin pagos</div>';
                return;
            }

            container.innerHTML = pagos.map(p => `
                <div class="payment-item">
                    <div class="payment-info">
                        <span class="payment-user">${p.telefono_remitente || 'Anónimo'}</span>
                        <span class="payment-meta">${p.metodo_pago || 'Muni'} • ${formatFecha(p.fecha_pago)}</span>
                    </div>
                    <div class="payment-amount" style="color: ${p.verificado ? 'var(--success)' : 'var(--warning)'}">
                        ${formatXAF(p.monto_detectado || 0)}
                    </div>
                </div>
            `).join('');
        }

        async function loadCompras() {
            const container = document.getElementById('comprasBody');
            const compras = await querySupabase('compras', 'select=nombre_pasajero,destino,tipo_billete,precio,estado_compra,fecha_compra&order=fecha_compra.desc&limit=10');
            
            const getEstadoBadge = (e) => {
                if (e === 'Billete pagado') return '<span class="badge badge-success">Pagado</span>';
                if (e === 'pendiente_pago') return '<span class="badge badge-warning">Pendiente</span>';
                return '<span class="badge badge-danger">Expirado</span>';
            };

            container.innerHTML = compras.map(c => `
                <tr>
                    <td><strong>${c.nombre_pasajero || '—'}</strong></td>
                    <td>${c.destino || '—'}</td>
                    <td>${formatXAF(c.precio || 0)}</td>
                    <td>${getEstadoBadge(c.estado_compra)}</td>
                </tr>
            `).join('');
        }

        async function loadAll() {
            if (!SUPABASE_URL || !SUPABASE_KEY) {
                showAlert('Configura Supabase en ⚙');
                updateStatus(false);
                return;
            }

            showAlert(null);
            
            try {
                await loadViaje();
                await Promise.all([
                    loadKPIs(),
                    loadInventario(),
                    loadPagos(),
                    loadCompras()
                ]);
                
                updateStatus(true);
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
            } catch (err) {
                showAlert('Error de conexión. Verifica credenciales.');
            }
        }

        // --- INIT ---
        window.addEventListener('load', () => {
            if (!SUPABASE_URL || !SUPABASE_KEY) {
                openModal();
            } else {
                loadAll();
            }
            setInterval(loadAll, 120000);
        });
    </script>
</body>
</html>
