<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003DA5">
    <title>Ferry Viteoca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003DA5;
            --primary-light: #0052CC;
            --accent: #C8102E;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F1F3F6;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --text-sec: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER COMPACTO --- */
        header {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
        }

        .logo i { font-size: 18px; }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #CBD5E1;
        }

        .dot.online {
            background: #22C55E;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn-header {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-header:active { background: rgba(255,255,255,0.2); }

        /* --- MAIN CONTENT --- */
        main {
            padding: 12px 12px 80px 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- HERO COMPACTO --- */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #0052CC 100%);
            color: white;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: '\f21a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 80px;
            opacity: 0.08;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .hero-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 11px;
        }

        .hero-info-item {
            background: rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px);
        }

        .hero-info-label {
            opacity: 0.7;
            font-weight: 500;
        }

        .hero-info-value {
            font-weight: 700;
        }

        /* --- KPI GRID ULTRA-COMPACTO --- */
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .kpi {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            border-left: 3px solid var(--primary);
        }

        .kpi.success { border-left-color: var(--success); }
        .kpi.warning { border-left-color: var(--warning); }
        .kpi.danger { border-left-color: var(--danger); }

        .kpi-label {
            font-size: 11px;
            color: var(--text-sec);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .kpi-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .kpi-sub {
            font-size: 10px;
            color: var(--text-sec);
            margin-top: 2px;
        }

        /* --- SECCIONES COMPACTAS --- */
        .section {
            background: var(--card);
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F8FAFC;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title i { font-size: 12px; }

        .section-body {
            padding: 0;
        }

        /* --- TABLA COMPACTA --- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background: #F8FAFC;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-sec);
            letter-spacing: 0.3px;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        tr:last-child td { border-bottom: none; }

        /* --- BADGES --- */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }
        .badge-info { background: #DBEAFE; color: #1E40AF; }

        /* --- BARRA DE PROGRESO --- */
        .progress {
            width: 100%;
            height: 5px;
            background: #E5E7EB;
            border-radius: 10px;
            overflow: hidden;
            margin: 4px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease;
        }

        /* --- DESGLOSE DE BILLETES --- */
        .ticket-breakdown {
            padding: 0;
        }

        .ticket-item {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .ticket-item:last-child { border-bottom: none; }

        .ticket-type {
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .ticket-stat {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 3px;
        }

        .ticket-stat-label {
            color: var(--text-sec);
        }

        .ticket-stat-value {
            font-weight: 700;
            color: var(--text);
        }

        .ticket-total {
            background: #F8FAFC;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
        }

        .grand-total {
            background: var(--primary);
            color: white;
            padding: 12px 14px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-sec);
        }

        .modal-body {
            padding: 16px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 61, 165, 0.1);
        }

        .modal-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:active { background: #002D7A; }

        .btn-ghost {
            background: var(--bg);
            color: var(--text);
        }

        .btn-ghost:active { background: #E5E7EB; }

        /* --- ALERT --- */
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .alert-danger {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 20px 14px;
            color: var(--text-sec);
            font-size: 12px;
        }

        /* --- RESPONSIVE DESKTOP --- */
        @media (min-width: 768px) {
            header {
                padding: 16px 24px;
            }

            main {
                padding: 20px 24px 40px;
            }

            .hero {
                padding: 16px 20px;
                margin-bottom: 20px;
            }

            .hero h2 { font-size: 18px; }

            .hero-info {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }

            .hero-info-item {
                padding: 8px 12px;
                font-size: 12px;
            }

            .kpi-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin-bottom: 20px;
            }

            .kpi {
                padding: 16px;
            }

            .kpi-label { font-size: 12px; }
            .kpi-value { font-size: 24px; }

            .section {
                margin-bottom: 20px;
            }

            .section-header {
                padding: 16px;
            }

            .section-title { font-size: 14px; }

            table {
                font-size: 13px;
            }

            th {
                padding: 12px 16px;
                font-size: 11px;
            }

            td {
                padding: 12px 16px;
            }

            .ticket-item {
                grid-template-columns: 1fr 1fr 1fr;
            }

            .modal {
                max-width: 600px;
            }
        }

        @media (min-width: 1024px) {
            .kpi-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <i class="fas fa-ship"></i>
            <span>Ferry Viteoca</span>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div id="statusDot" class="dot"></div>
                <span id="statusText">Offline</span>
            </div>
            <button class="btn-header" onclick="openModal()" title="Configurar">
                <i class="fas fa-cog"></i>
            </button>
            <button class="btn-header" onclick="loadAll()" title="Actualizar">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <main>
        <div id="errorAlert" class="alert alert-danger"></div>

        <!-- HERO CON INFORMACIÓN DEL VIAJE -->
        <div class="hero">
            <div class="hero-content">
                <h2 id="viajeDestino">Cargando viaje...</h2>
                <div class="hero-info">
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="far fa-calendar"></i> Fecha</span>
                        <span class="hero-info-value" id="viajeFecha">—</span>
                    </div>
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="far fa-clock"></i> Hora</span>
                        <span class="hero-info-value" id="viajeHora">—</span>
                    </div>
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="fas fa-info-circle"></i> Estado</span>
                        <span class="hero-info-value" id="viajeEstado">—</span>
                    </div>
                    <div class="hero-info-item">
                        <span class="hero-info-label"><i class="far fa-clock"></i> Actualizado</span>
                        <span class="hero-info-value" id="lastUpdate">—</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI GRID -->
        <div class="kpi-grid">
            <div class="kpi success">
                <div class="kpi-label"><i class="fas fa-check"></i> Vendidos</div>
                <div class="kpi-value" id="kpi-vendidos">0</div>
                <div class="kpi-sub">Billetes totales</div>
            </div>
            <div class="kpi warning">
                <div class="kpi-label"><i class="fas fa-wallet"></i> Ingresos</div>
                <div class="kpi-value" id="kpi-ingresos" style="font-size: 16px;">0</div>
                <div class="kpi-sub">XAF</div>
            </div>
            <div class="kpi warning">
                <div class="kpi-label"><i class="fas fa-users"></i> Disponibles</div>
                <div class="kpi-value" id="kpi-disponibles">0</div>
                <div class="kpi-sub">Económicos</div>
            </div>
            <div class="kpi danger">
                <div class="kpi-label"><i class="fas fa-chart-pie"></i> Ocupación</div>
                <div class="kpi-value" id="kpi-ocupacion">0%</div>
                <div class="kpi-sub">Total</div>
            </div>
        </div>

        <!-- DESGLOSE DE INVENTARIO POR TIPO DE BILLETE -->
        <div class="section">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-ticket-alt"></i> Desglose de Billetes</h3>
            </div>
            <div class="section-body ticket-breakdown" id="ticketBreakdown">
                <div class="empty-state">Cargando inventario...</div>
            </div>
        </div>

        <!-- RESUMEN TOTAL -->
        <div class="section">
            <div class="grand-total" id="grandTotal">
                Total General: 0 XAF
            </div>
        </div>
    </main>

    <!-- MODAL CONFIGURACIÓN -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-database" style="color: var(--primary); margin-right: 8px;"></i>Supabase</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL del Proyecto</label>
                    <input type="text" id="inputUrl" class="form-control" placeholder="https://xxxxx.supabase.co">
                </div>
                <div class="form-group">
                    <label>Clave Anon</label>
                    <input type="password" id="inputKey" class="form-control" placeholder="Clave...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveConfig()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        let SUPABASE_URL = localStorage.getItem('fv_url') || '';
        let SUPABASE_KEY = localStorage.getItem('fv_key') || '';
        
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

  width: 34px; height: 34px;

  display: grid;
  place-items: center;
  font-size: 13px;
  transition: background 0.15s;
}
.hdr-btn:active { background: rgba(255,255,255,0.14); }

/* ── MAIN ── */

  padding: 14px 14px calc(24px + var(--safe-bot));
}

/* ── ALERT ── */

  background: #FEE2E2;

  padding: 10px 13px;
  font-size: 12px;
  margin-bottom: 12px;
  display: none;
}
.alert.show { display: block; }

/* ── HERO CARD ── */

  overflow: hidden;
}

.hero::before {

  position: absolute;
  right: -30px; top: -30px;

  border-radius: 50%;
  background: rgba(233,162,59,0.07);
  pointer-events: none;
}

.hero-route {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.hero-dest {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}

.hero-wave {
  width: 22px; height: 22px;
  opacity: 0.5;
  flex-shrink: 0;
}

.hero-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-family: var(--mono);
  margin-bottom: 14px;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.hero-stat {
  background: rgba(255,255,255,0.06);

  border-radius: 10px;
  padding: 10px 12px;
}

.hs-label {

}

.hs-val {

  font-weight: 700;
  color: #fff;
  font-family: var(--mono);
}

.hs-unit {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  margin-left: 2px;
  font-family: var(--mono);
}

/* ── KPI STRIP ── */
.kpi-strip {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.kpi {
  background: var(--card);
  border-radius: 14px;
  padding: 14px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.kpi::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  background: var(--accent-color, var(--navy));
}

.kpi-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text2);
  font-family: var(--mono);
  margin-bottom: 6px;
}

.kpi-num {
  font-size: 26px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--text);
  line-height: 1;
  margin-bottom: 3px;
}

.kpi-num.sm { font-size: 17px; }

.kpi-hint {
  font-size: 10px;
  color: var(--text2);
  font-family: var(--mono);
}

/* ── SECTION CARD ── */
.sec {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
}

.sec-head {
  padding: 13px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.sec-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--navy);
  font-family: var(--mono);
  display: flex;
  align-items: center;
  gap: 7px;
}

.sec-icon {
  width: 22px; height: 22px;
  background: var(--navy);
  border-radius: 6px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.sec-icon svg { width: 11px; height: 11px; fill: #fff; }

.sec-badge {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text2);
}

/* ── INVENTARIO CARDS ── */
.inv-grid {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.inv-row {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
}
.inv-row:last-child { border-bottom: none; }

.inv-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.inv-type { font-size: 13px; font-weight: 600; color: var(--text); }
.inv-price {
  font-size: 13px;
  font-family: var(--mono);
  font-weight: 500;
  color: var(--navy);
}

.inv-bar-wrap {
  position: relative;
  height: 7px;
  background: #EEF0F5;
  border-radius: 10px;
  margin-bottom: 6px;
  overflow: hidden;
}

.inv-bar {
  height: 100%;
  border-radius: 10px;
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
}

.inv-stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.inv-pct {
  font-size: 11px;
  font-family: var(--mono);
  font-weight: 500;
}

.inv-slots {
  font-size: 10px;
  color: var(--text2);
  font-family: var(--mono);
}

.badge-sm {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px;
  font-family: var(--mono);
  font-weight: 500;
}

.badge-ok { background: #DCFCE7; color: #166534; }
.badge-low { background: #FEF9C3; color: #854D0E; }
.badge-out { background: #FEE2E2; color: #991B1B; }
.badge-info { background: #DBEAFE; color: #1E3A8A; }

/* ── PAGOS ── */
.pago-row {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.pago-row:last-child { border-bottom: none; }

.pago-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #EEF0F5;
  display: grid;
  place-items: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--navy);
  flex-shrink: 0;
}

.pago-info { flex: 1; min-width: 0; }
.pago-tel { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pago-meta { font-size: 10px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }

.pago-right { text-align: right; flex-shrink: 0; }
.pago-monto { font-size: 13px; font-weight: 600; font-family: var(--mono); }
.pago-monto.ok { color: var(--teal); }
.pago-monto.pend { color: var(--amber-dim); }

/* ── COMPRAS TABLE ── */
.compras-list { display: flex; flex-direction: column; }

.compra-row {
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.compra-row:last-child { border-bottom: none; }

.compra-init {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--surface);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--navy-light);
  flex-shrink: 0;
  font-family: var(--mono);
}

.compra-info { flex: 1; min-width: 0; }
.compra-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.compra-dest { font-size: 10px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }

.compra-right { text-align: right; flex-shrink: 0; }
.compra-price { font-size: 12px; font-family: var(--mono); font-weight: 500; color: var(--text); }

/* ── EMPTY ── */
.empty {
  padding: 28px 16px;
  text-align: center;
  color: var(--text2);
  font-size: 12px;
  font-family: var(--mono);
}

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 500;
  padding-bottom: var(--safe-bot);
}
.overlay.show { display: flex; }

.modal {
  background: var(--card);
  width: 100%;
  max-width: 520px;
  border-radius: 20px 20px 0 0;
  animation: slideUp 0.28s ease-out;
  padding-bottom: calc(16px + var(--safe-bot));
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 10px auto 0;
}

.modal-hdr {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-hdr h3 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.modal-close {
  background: var(--surface);
  border: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  display: grid;
  place-items: center;
}

.modal-body { padding: 16px 18px; }

.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 6px; }

.fc {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  font-family: var(--mono);
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.fc:focus { outline: none; border-color: var(--navy); background: #fff; }

.modal-ftr {
  padding: 0 18px;
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary { background: var(--navy); color: #fff; }
.btn-primary:active { background: var(--navy-mid); transform: scale(0.98); }
.btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:active { transform: scale(0.98); }

/* ── TIMESTAMP ── */
.ts-pill {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--text2);
  background: var(--surface);
  padding: 3px 7px;
  border-radius: 6px;
}

/* ── SPINNING ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.8s linear infinite; display: inline-block; }

/* ── Desktop adjustments ── */
@media (min-width: 640px) {
  main { padding: 20px; max-width: 700px; margin: 0 auto; }
  .kpi-strip { grid-template-columns: repeat(4,1fr); }
  .hero-grid { grid-template-columns: repeat(4,1fr); }
  .modal { border-radius: 16px; max-width: 480px; margin-bottom: 40px; }
  .overlay { align-items: center; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">

      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>

    </button>

</header>

<main>
  <div class="alert" id="alertBox"></div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-route">
      <div class="hero-dest" id="heroDestino">Cargando...</div>
    </div>
    <div class="hero-meta" id="heroMeta">— • — • —</div>
    <div class="hero-grid" id="heroGrid">
      <div class="hero-stat"><div class="hs-label">Estado</div><div class="hs-val" id="h-estado">—</div></div>
      <div class="hero-stat"><div class="hs-label">Salida</div><div class="hs-val" id="h-hora">—</div></div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-strip">
    <div class="kpi" style="--accent-color: #2BBFA3">
      <div class="kpi-label">Pagados</div>
      <div class="kpi-num" id="k-pagados">0</div>
      <div class="kpi-hint" id="k-pagados-h">billetes</div>
    </div>
    <div class="kpi" style="--accent-color: #E9A23B">
      <div class="kpi-label">Ingresos</div>
      <div class="kpi-num sm" id="k-ingresos">0</div>
      <div class="kpi-hint">XAF</div>
    </div>
    <div class="kpi" style="--accent-color: #E9A23B">
      <div class="kpi-label">Pendientes</div>
      <div class="kpi-num" id="k-pend">0</div>
      <div class="kpi-hint">por pagar</div>
    </div>
    <div class="kpi" style="--accent-color: #0A1628">
      <div class="kpi-label">Stock</div>
      <div class="kpi-num" id="k-stock">0</div>
      <div class="kpi-hint">disponibles</div>

  <!-- INVENTARIO -->
  <div class="sec">
    <div class="sec-head">
      <div class="sec-title">
        <div class="sec-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        </div>
        Inventario
      </div>
      <span class="ts-pill" id="lastTs"></span>
    </div>
    <div class="inv-grid" id="invGrid">
      <div class="empty">Cargando...</div>
    </div>
  </div>

  <!-- PAGOS RECIENTES -->
  <div class="sec">
    <div class="sec-head">
      <div class="sec-title">
        <div class="sec-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>

</main>

<!-- MODAL CONFIGURACIÓN -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <h3>Conexión Supabase</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>URL del proyecto</label>
        <input class="fc" type="text" id="iUrl" placeholder="https://xxxxx.supabase.co">
      </div>
      <div class="fg">
        <label>Clave anon</label>
        <input class="fc" type="password" id="iKey" placeholder="eyJhbGciOiJIUzI1NiIs...">
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveConfig()">Guardar y conectar</button>
    </div>
  </div>
</div>

<script>
let SB_URL = localStorage.getItem('fv_url') || '';
let SB_KEY = localStorage.getItem('fv_key') || '';
let destino = null;

const fmt = n => new Intl.NumberFormat('es-GQ').format(Math.round(n || 0));
const fmtDate = s => {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short' }) + ' ' + d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
};
const initials = s => s ? s.trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() : '?';

function setStatus(on) {
  document.getElementById('statusDot').className = 'dot' + (on ? ' on' : '');
  document.getElementById('statusTxt').textContent = on ? 'Online' : 'Offline';
}

function showAlert(msg) {
  const el = document.getElementById('alertBox');
  el.textContent = msg || '';
  el.className = 'alert' + (msg ? ' show' : '');
  if (msg) setStatus(false);
}

function openModal() {
  document.getElementById('iUrl').value = SB_URL;
  document.getElementById('iKey').value = SB_KEY;
  document.getElementById('overlay').classList.add('show');
}
function closeModal() { document.getElementById('overlay').classList.remove('show'); }

function saveConfig() {
  const u = document.getElementById('iUrl').value.trim().replace(/\/$/, '');
  const k = document.getElementById('iKey').value.trim();
  if (!u || !k) { alert('Completa ambos campos'); return; }
  SB_URL = u; SB_KEY = k;
  localStorage.setItem('fv_url', u);
  localStorage.setItem('fv_key', k);
  closeModal();
  loadAll();
}

async function api(table, qs = '') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function loadViaje() {
  const [v] = await api('viajes', 'activo=eq.true&limit=1');
  if (!v) {
    document.getElementById('heroDestino').textContent = 'Sin viaje activo';
    document.getElementById('heroMeta').textContent = '—';
    return;
  }
  destino = v.destino;
  const fecha = new Date(v.fecha_salida).toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short' });
  document.getElementById('heroDestino').textContent = v.destino;
  document.getElementById('heroMeta').textContent = `${fecha}`;
  document.getElementById('h-estado').textContent = v.estado || '—';
  document.getElementById('h-hora').textContent = v.hora_salida?.slice(0,5) || '—';
  document.getElementById('hdrSub').textContent = v.destino;
}

async function loadKPIs() {
  const [compras, inv] = await Promise.all([
    api('compras', 'select=estado_compra,precio'),
    api('inventario', destino ? `destino=eq.${encodeURIComponent(destino)}` : '')
  ]);
  const pagados = compras.filter(c => c.estado_compra === 'Billete pagado');
  const pend = compras.filter(c => c.estado_compra === 'pendiente_pago');
  const exp = compras.filter(c => c.estado_compra === 'billete_expirado');
  const ingresos = pagados.reduce((s,c) => s + (c.precio||0), 0);
  const stock = inv.reduce((s,i) => s + (i.stock_disponible||0), 0);
  document.getElementById('k-pagados').textContent = pagados.length;
  document.getElementById('k-pagados-h').textContent = exp.length + ' expirados';
  document.getElementById('k-ingresos').textContent = fmt(ingresos);
  document.getElementById('k-pend').textContent = pend.length;
  document.getElementById('k-stock').textContent = stock;
}

async function loadInventario() {
  const grid = document.getElementById('invGrid');
  if (!destino) { grid.innerHTML = '<div class="empty">Sin viaje activo</div>'; return; }
  const inv = await api('inventario', `destino=eq.${encodeURIComponent(destino)}&order=tipo_billete`);
  if (!inv.length) { grid.innerHTML = '<div class="empty">Sin datos de inventario</div>'; return; }

  const totalStock = inv.reduce((s,i)=>s+(i.stock_disponible||0),0);

  grid.innerHTML = inv.map(i => {
    const disp = i.stock_disponible || 0;
    const res  = i.stock_reservado  || 0;
    const vend = i.stock_vendido    || 0;
    const total = disp + res + vend;
    const pctVend = total > 0 ? Math.round((vend / total) * 100) : 0;
    const pctDisp = total > 0 ? Math.round((disp / total) * 100) : 0;

    let barColor, badgeCls, badgeTxt;
    if (pctVend >= 90) { barColor='#E05252'; badgeCls='badge-out'; badgeTxt='Agotándose'; }
    else if (pctVend >= 65) { barColor='#E9A23B'; badgeCls='badge-low'; badgeTxt='Poca disponibilidad'; }
    else { barColor='#2BBFA3'; badgeCls='badge-ok'; badgeTxt='Disponible'; }

    return `
    <div class="inv-row">
      <div class="inv-top">
        <div>
          <div class="inv-type">${i.tipo_billete}</div>
          <div style="font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px">${fmt(i.precio)} XAF</div>
        </div>
        <span class="badge-sm ${badgeCls}">${badgeTxt}</span>
      </div>
      <div class="inv-bar-wrap">
        <div class="inv-bar" style="width:${pctVend}%;background:${barColor}"></div>
      </div>
      <div class="inv-stats">
        <span class="inv-pct" style="color:${barColor}">${pctVend}% vendido</span>
        <span class="inv-slots">${disp} libres / ${total} total</span>
      </div>
      <div style="display:flex;gap:10px;margin-top:7px;font-size:10px;font-family:var(--mono);color:var(--text2)">
        <span>🟢 Libres: ${disp} (${pctDisp}%)</span>
        <span>🔵 Reservados: ${res}</span>
        <span>🔴 Vendidos: ${vend}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('lastTs').textContent = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

async function loadPagos() {
  const el = document.getElementById('pagosGrid');
  const pagos = await api('pagos', 'select=monto_detectado,telefono_remitente,metodo_pago,fecha_pago,verificado&order=fecha_pago.desc&limit=8');
  document.getElementById('pagos-count').textContent = pagos.length + ' recientes';
  if (!pagos.length) { el.innerHTML = '<div class="empty">Sin pagos registrados</div>'; return; }
  el.innerHTML = pagos.map(p => `
    <div class="pago-row">
      <div class="pago-avatar">${initials(p.telefono_remitente || 'AN')}</div>
      <div class="pago-info">
        <div class="pago-tel">${p.telefono_remitente || 'Anónimo'}</div>
        <div class="pago-meta">${p.metodo_pago || 'Muni'} · ${fmtDate(p.fecha_pago)}</div>
      </div>
      <div class="pago-right">
        <div class="pago-monto ${p.verificado ? 'ok' : 'pend'}">${fmt(p.monto_detectado)} XAF</div>
        <div style="font-size:9px;font-family:var(--mono);color:var(--text2);margin-top:2px">${p.verificado ? 'verificado' : 'pendiente'}</div>
      </div>
    </div>`).join('');
}

async function loadCompras() {
  const el = document.getElementById('comprasGrid');
  const compras = await api('compras', 'select=nombre_pasajero,destino,tipo_billete,precio,estado_compra,fecha_compra&order=fecha_compra.desc&limit=12');
  document.getElementById('compras-count').textContent = compras.length + ' recientes';
  if (!compras.length) { el.innerHTML = '<div class="empty">Sin compras</div>'; return; }

  const estadoBadge = e => {
    if (e === 'Billete pagado') return '<span class="badge-sm badge-ok">Pagado</span>';
    if (e === 'pendiente_pago') return '<span class="badge-sm badge-low">Pendiente</span>';
    return '<span class="badge-sm badge-out">Expirado</span>';
  };

  el.innerHTML = compras.map(c => `
    <div class="compra-row">
      <div class="compra-init">${initials(c.nombre_pasajero)}</div>
      <div class="compra-info">
        <div class="compra-name">${c.nombre_pasajero || '—'}</div>
        <div class="compra-dest">${c.destino || '—'} · ${c.tipo_billete || '—'}</div>
      </div>
      <div class="compra-right">
        <div class="compra-price">${fmt(c.precio)} XAF</div>
        <div style="margin-top:4px">${estadoBadge(c.estado_compra)}</div>
      </div>
    </div>`).join('');
}

async function loadAll() {
  if (!SB_URL || !SB_KEY) { showAlert('Configura la conexión Supabase pulsando ⚙'); return; }
  const btn = document.getElementById('refreshBtn');
  btn.querySelector('svg').style.animation = 'spin 0.8s linear infinite';
  showAlert(null);
  try {
    await loadViaje();
    await Promise.all([loadKPIs(), loadInventario(), loadPagos(), loadCompras()]);
    setStatus(true);
  } catch(e) {
    showAlert('Error de conexión. Verifica las credenciales.');
  } finally {
    btn.querySelector('svg').style.animation = '';
  }
}

window.addEventListener('load', () => {
  if (!SB_URL || !SB_KEY) openModal();
  else loadAll();
  setInterval(loadAll, 120000);
});

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
</script>
</body>
</html>
